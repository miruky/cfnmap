<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 230" role="img" aria-label="cfnmapのアーキテクチャ図">
  <title>cfnmapのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b949e; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #2aa39a; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #18897f; }
    .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="20" y="80" width="170" height="70" rx="8" class="box"/>
  <text x="40" y="108" class="label">テンプレート</text>
  <text x="40" y="130" class="small">JSON / YAML短縮タグ</text>

  <rect x="250" y="80" width="150" height="70" rx="8" class="accent-box"/>
  <text x="270" y="108" class="accent-label">parseTemplate</text>
  <text x="270" y="130" class="small">検証と正規化</text>

  <rect x="460" y="20" width="150" height="60" rx="8" class="accent-box"/>
  <text x="480" y="46" class="accent-label">extractEdges</text>
  <text x="480" y="66" class="small">Ref / GetAtt / Sub</text>

  <rect x="460" y="150" width="150" height="60" rx="8" class="accent-box"/>
  <text x="480" y="176" class="accent-label">layoutGraph</text>
  <text x="480" y="196" class="small">階層レイアウト</text>

  <rect x="670" y="80" width="150" height="70" rx="8" class="accent-box"/>
  <text x="690" y="108" class="accent-label">buildDiagram</text>
  <text x="690" y="130" class="small">SVG文字列を生成</text>

  <rect x="860" y="86" width="60" height="58" rx="8" class="box"/>
  <text x="874" y="112" class="label">UI</text>
  <text x="869" y="132" class="small">表示と</text>
  <text x="869" y="146" class="small">書出し</text>

  <path class="arrow" d="M190 115 H242"/>
  <path class="arrow" d="M400 100 C430 90 430 60 452 52"/>
  <path class="arrow" d="M400 130 C430 140 430 170 452 178"/>
  <path class="arrow" d="M610 52 C640 60 640 90 662 100"/>
  <path class="arrow" d="M610 178 C640 170 640 140 662 130"/>
  <path class="arrow" d="M820 115 H852"/>
</svg>
